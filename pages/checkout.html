<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Digitales de Juegos </title>
    <meta name="description" content="Cordoba.Store">
    <!-- fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bungee&family=Fugaz+One&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/estilos.css">
</head>

<body class="fondo-checkout">

    <header class="w-100 bg-black border-bottom-steam sticky-top py-2 px-3">
        <div class="container-fluid d-flex justify-content-center align-items-center">

            <div class="d-flex align-items-center">
                <h1 style="display: none;">Cordoba.Store</h1>
                <a href="../index.html" class="d-flex align-items-center">
                    <img src="../img/logo/logo-pequeño.svg" alt="Cordoba Store" style="height: 40px; width: auto;">
                </a>
            </div>
        </div>

        </div>
    </header>

    <main id="pagina3" class="overflow-hidden">
        <div class="d-flex justify-content-between align-content-center row-cols-3 p-2 m-5">
            <div class="border bg-white border-secondary rounded m-2 col-7">
                <div id="VXvoGIf1A" class="rounded p-3">
                    <p class="fs-3 d-flex justify-content-center align-items-center text-dark fw-semibold">Productos
                        totales</p>
                    <div id="VXvoGIf1B" class="carrito-scroll" style="min-height: 245px;">
                    </div>
                </div>
            </div>
            <div class="bg-white border rounded m-4">
                <form id="formulario-checkout" class="p-4 mt-2">
                    <div class="mt-5 row mb-3">
                        <div class="col-6">
                            <label for="input-nombre" class="form-label fw-semibold">Nombre</label>
                            <input type="text" id="input-nombre" name="nombre" class="form-control"
                                placeholder="Ej: Enzo" required>
                        </div>

                        <div class="col-6">
                            <label for="input-apellido" class="form-label fw-semibold">Apellido</label>
                            <input type="text" id="input-apellido" name="apellido" class="form-control"
                                placeholder="Ej: Pérez" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="input-dni" class="form-label fw-semibold">DNI</label>
                        <input type="text" id="input-dni" name="dni" class="form-control"
                            placeholder="Sin puntos, ej: 42123456" pattern="\d{7,8}"
                            title="El DNI debe contener entre 7 y 8 dígitos numéricos sin puntos." required>
                    </div>
                    <input type="submit" value="Finalizar compra"
                        class="btn btn-info col-12 fw-bold text-dark rounded text-decoration-none">
                </form>
            </div>
        </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/codigo.js"></script>
</body>

</html>
