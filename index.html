<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Digitales de Juegos </title>
    <meta name="description" content="Cordoba Store SLOGAN">
    <!-- fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bungee&family=Fugaz+One&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/estilos.css">
</head>

<body>

    <header class="w-100 bg-black border-bottom-steam sticky-top py-2 px-3">
        <div class="container-fluid d-flex justify-content-between align-items-center">

            <div class="d-flex align-items-center">
                <h1 style="display: none;">Cordoba.Store</h1>
                <a href="./index.html" class="d-flex align-items-center">
                    <img src="../img/logo/logo-pequeño.svg" alt="Cordoba Store" style="height: 40px; width: auto;">
                </a>
            </div>

            <div id="Carrito" class="d-flex align-items-center">
                <button class="btn btn-outline-info position-relative d-flex align-items-center gap-2" type="button"
                    data-bs-toggle="dropdown" data-bs-auto-close="outside" aria-expanded="false">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
                        class="bi bi-cart3" viewBox="0 0 16 16">
                        <path
                            d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .49.598l-1 5a.5.5 0 0 1-.465.401l-9.397.472L4.415 11H13a.5.5 0 0 1 0 1H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5M3.102 4l.84 4.479 9.144-.459L13.89 4zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4m7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2m7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2" />
                    </svg>
                    <span>Carrito</span>
                    <span id="cantidad-items-carrito"
                        class="badge bg-danger rounded-circle position-absolute top-0 start-100 translate-middle p-1 px-2 fs-6"></span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark p-3 mb-5" id="lista-carrito-dropdown"
                    style="min-width: 320px;">
                    <span class="fs-5 text-white fw-semibold">Carro</span>
                    <div id="items-carrito" class="carrito-scroll" style="min-height: 75px;">
                    </div>
                    <div id="footer-carrito" class="p-2">
                        <li class="d-flex justify-content-between align-items-center mb-3 row">
                            <span class="fw-bold text-white">Total:</span>
                            <span id="total-carrito" class="text-info fw-bold fs-5">$0</span>
                        </li>
                        <li>
                            <a href="./pages/checkout.html"><button class="btn btn-info w-100 fw-bold text-dark rounded">Proceder al Pago</button></a>
                        </li>
                    </div>
                </ul>
            </div>

        </div>
    </header>

    <main class="container-1 overflow-hidden bg-black">
        <div id="filtros" class="d-sm-flex justify-content-center border p-5">
            <div class="btn-group" role="group">
                <button type="button" class="btn btn-primary dropdown-toggle btn-lg" data-bs-toggle="dropdown"
                    aria-expanded="false">
                    Categorias
                </button>
                <ul id="f-generos" class="dropdown-menu">
                </ul>
            </div>
            <div class="btn-group" role="group">
                <button type="button" class="btn btn-primary dropdown-toggle btn-lg" data-bs-toggle="dropdown"
                    aria-expanded="false">
                    Precio
                </button>
                <ul id="f-precio" class="dropdown-menu">
                </ul>
            </div>
            <div class="btn-group" role="group">
                <button type="button" class="btn btn-primary dropdown-toggle btn-lg" data-bs-toggle="dropdown"
                    aria-expanded="false">
                    Plataforma
                </button>
                <ul id="f-plataforma" class="dropdown-menu">
                </ul>
            </div>
            <div class="btn-group" role="group">
                <button type="button" class="btn btn-primary dropdown-toggle btn-lg" data-bs-toggle="dropdown"
                    aria-expanded="false">
                    Descuentos
                </button>
                <ul id="f-descuentos" class="dropdown-menu">
                </ul>
            </div>
        </div>
        <div id="EymrNHzbVl" class="row m-2">
        </div>
    </main>

    <!-- <footer
        class="d-flex position-absolute bottom--100 w-100 h-1 text-white py-2 border-0 justify-content-evenly align-items-stretch">
        <nav class="fs-4 list-unstyled align-items-center gap-3 m-0 p-0">
            <p>Creado por oZen</p>
        </nav>
    </footer> -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="../js/codigo.js"></script>
</body>

</html>
